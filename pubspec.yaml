name: classwidget
description: A student scheduling app with an Android home screen widget.
version: 3.1.0+4
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Requested Dependencies & Versions (Latest)
  flutter_riverpod: ^2.4.9
  home_widget: ^0.9.0
  excel: ^4.0.6
  csv: ^7.2.0
  file_picker: ^10.3.10
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  workmanager: ^0.9.0+3
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#38BDF8" # Primary color for adaptive icons
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
